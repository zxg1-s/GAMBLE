<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT SPIN</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --bg2: #0f1117;
    --panel: #13151e;
    --border: #1e2236;
    --accent: #e8a020;
    --accent2: #ff6b1a;
    --text: #c8d0e0;
    --text-dim: #5a6080;
    --common:    #b0b8c8;
    --uncommon:  #4db8ff;
    --rare:      #7060ff;
    --mythical:  #b040ff;
    --legendary: #e8a020;
    --ancient:   #eb4b4b;
    --contraband:#ffd700;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Animated background grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,15,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(232,160,32,0.5));
  }

  .header-stats {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
  }

  .stat-pill .label { color: var(--text-dim); font-size: 11px; letter-spacing: 1px; }
  .stat-pill .val { color: var(--accent); font-size: 16px; font-weight: 700; }

  .balance-btn {
    display: flex; gap: 10px; align-items: center;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 0;
    height: calc(100vh - 65px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .case-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .case-card::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    background: var(--card-color, var(--accent));
    opacity: 0.6;
  }

  .case-card:hover {
    border-color: var(--card-color, var(--accent));
    box-shadow: 0 0 20px rgba(232,160,32,0.15);
    transform: translateX(4px);
  }

  .case-card.active {
    border-color: var(--card-color, var(--accent));
    box-shadow: 0 0 30px rgba(232,160,32,0.2);
  }

  .case-icon {
    font-size: 36px;
    text-align: center;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 8px var(--card-color, var(--accent)));
  }

  .case-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    color: var(--text);
  }

  .case-price-tag {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
  }

  /* ── CENTER ── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    gap: 24px;
    overflow-y: auto;
  }

  /* SPINNER WINDOW */
  .spinner-container {
    width: 100%;
    max-width: 740px;
    position: relative;
  }

  .spinner-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 12px;
  }

  .spinner-window {
    position: relative;
    width: 100%;
    height: 140px;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel);
  }

  /* Center marker */
  .spinner-window::before,
  .spinner-window::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    z-index: 20;
    pointer-events: none;
  }
  .spinner-window::before {
    background: var(--accent);
    box-shadow: 0 0 16px var(--accent), 0 0 30px var(--accent);
  }
  /* Arrow top + bottom */
  .spinner-arrow-top,
  .spinner-arrow-bottom {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    z-index: 25;
    pointer-events: none;
  }
  .spinner-arrow-top {
    top: -1px;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 14px solid var(--accent);
  }
  .spinner-arrow-bottom {
    bottom: -1px;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 14px solid var(--accent);
  }

  /* Edge fades */
  .spinner-window-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
      var(--panel) 0%,
      transparent 18%,
      transparent 82%,
      var(--panel) 100%
    );
    z-index: 10;
    pointer-events: none;
  }

  .spinner-track {
    display: flex;
    align-items: center;
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    will-change: transform;
  }

  .spin-item {
    width: 120px;
    height: 130px;
    flex-shrink: 0;
    margin: 5px 4px;
    border-radius: 8px;
    border: 2px solid var(--item-color, var(--border));
    background: linear-gradient(160deg, rgba(255,255,255,0.04), transparent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }

  .spin-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, var(--item-color, var(--border)), transparent 60%);
    opacity: 0.08;
  }

  .spin-item .item-model {
    font-size: 42px;
    filter: drop-shadow(0 0 12px var(--item-color, var(--border)));
    line-height: 1;
  }

  .spin-item .item-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--item-color, var(--text-dim));
    text-align: center;
    padding: 0 4px;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .spin-item.winner {
    border-color: var(--item-color) !important;
    box-shadow: 0 0 40px var(--item-color), inset 0 0 30px rgba(255,255,255,0.05) !important;
    animation: winner-pulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes winner-pulse {
    from { box-shadow: 0 0 20px var(--item-color), inset 0 0 20px rgba(255,255,255,0.03); }
    to   { box-shadow: 0 0 60px var(--item-color), 0 0 100px var(--item-color, rgba(232,160,32,0.3)), inset 0 0 40px rgba(255,255,255,0.07); }
  }

  /* ── CONTROLS ── */
  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 740px;
  }

  .key-slot {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
  }

  .key-count {
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .btn:hover::after { opacity: 1; }

  .btn-spin {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0b0f;
    box-shadow: 0 4px 30px rgba(232,160,32,0.4);
    min-width: 200px;
  }
  .btn-spin:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(232,160,32,0.6);
  }
  .btn-spin:active { transform: translateY(0); }
  .btn-spin:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-buy-key {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
  }
  .btn-buy-key:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESULT CARD ── */
  .result-card {
    width: 100%;
    max-width: 740px;
    border-radius: 12px;
    padding: 24px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--result-color, var(--border));
    background: var(--panel);
    animation: result-appear 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes result-appear {
    from { transform: scale(0.8) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .result-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, var(--result-color, transparent), transparent 70%);
    opacity: 0.06;
  }

  .result-rarity-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--result-color, var(--text-dim));
    text-transform: uppercase;
  }

  .result-model { font-size: 72px; filter: drop-shadow(0 0 24px var(--result-color, transparent)); }

  .result-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--result-color, var(--text));
    text-align: center;
  }

  .result-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
  }

  /* ── HISTORY PANEL ── */
  .history-panel {
    border-left: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    border-left: 3px solid var(--item-color, var(--border));
    animation: slide-in 0.3s ease;
    transition: all 0.2s;
  }

  @keyframes slide-in {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .history-item:hover { border-color: var(--item-color, var(--border)); background: rgba(255,255,255,0.02); }

  .history-emoji { font-size: 24px; filter: drop-shadow(0 0 6px var(--item-color, transparent)); }

  .history-info { flex: 1; min-width: 0; }
  .history-name {
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--item-color, var(--text));
  }
  .history-case { font-size: 10px; color: var(--text-dim); }

  /* ── ODDS TABLE ── */
  .odds-section {
    width: 100%;
    max-width: 740px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .odds-header {
    padding: 14px 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .odds-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }

  .odds-row:last-child { border-bottom: none; }

  .odds-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dot-color);
    box-shadow: 0 0 6px var(--dot-color);
    flex-shrink: 0;
  }

  .odds-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin: 0 12px;
    overflow: hidden;
  }

  .odds-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--dot-color);
    opacity: 0.7;
  }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    border-radius: 50%;
    animation: particle-fly linear forwards;
  }
  @keyframes particle-fly {
    to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* Screen flash */
  .flash-overlay {
    position: fixed; inset: 0;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    background: var(--flash-color, white);
    transition: opacity 0.1s;
  }
  .flash-overlay.active {
    opacity: 0.12;
    transition: none;
  }

  /* ── GUN SVG styles ── */
  .gun-svg-wrap {
    display: flex;
    justify-content: center;
    margin-top: 4px;
  }

  /* notification toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    z-index: 2000;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<div class="flash-overlay" id="flashOverlay"></div>

<!-- ── HEADER ── -->

  <div class="header-stats">

    <!-- ODDS -->
    <div class="odds-section" id="oddsSection"></div>
  </div>

  <!-- HISTORY -->
  <div class="history-panel">
    <div class="sidebar-title">RECENT DROPS</div>
    <div id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTick() {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.value = 800 + Math.random()*200;
  g.gain.setValueAtTime(0.08, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.07);
  o.start(); o.stop(AC.currentTime+0.07);
}

function playReveal(rarity) {
  const colors = {
    common:0, uncommon:200, rare:240, mythical:280, legendary:40, ancient:0, contraband:50
  };
  const freq = 300 + (colors[rarity]||0)/360*400;
  // Two notes for reveal ding
  [0, 0.15, 0.3].forEach((t,i) => {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'sine';
    o.frequency.value = freq * (1 + i*0.25);
    g.gain.setValueAtTime(0, AC.currentTime+t);
    g.gain.linearRampToValueAtTime(0.3, AC.currentTime+t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+t+0.5);
    o.start(AC.currentTime+t);
    o.stop(AC.currentTime+t+0.6);
  });
}

function playOpenClick() {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(200, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, AC.currentTime+0.15);
  g.gain.setValueAtTime(0.15, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.15);
  o.start(); o.stop(AC.currentTime+0.15);
}

function resumeAudio() {
  if(AC.state === 'suspended') AC.resume();
}

// ══════════════════════════════════════════
//  WEIGHTED RANDOM
// ══════════════════════════════════════════

function weightedRoll(items) {
  // Build cumulative rarity table
  const cum = [];
  let total = 0;
  for(const [key, r] of Object.entries(RARITIES)) {
    total += r.prob;
    cum.push({key, thresh: total});
  }
  const roll = Math.random() * total;
  let rarity = 'common';
  for(const c of cum) {
    if(roll <= c.thresh) { rarity = c.key; break; }
  }
  // Filter items by rarity, fall back to closest
  let pool = items.filter(i => i.rarity === rarity);
  if(!pool.length) {
    // fallback: pick nearest
    const order = Object.keys(RARITIES);
    let idx = order.indexOf(rarity);
    while(pool.length === 0 && idx >= 0) {
      pool = items.filter(i => i.rarity === order[idx]);
      idx--;
    }
    if(!pool.length) pool = items;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

// ══════════════════════════════════════════
//  SPINNER BUILD
// ══════════════════════════════════════════

const ITEM_W = 128; // 120px + 4+4 margin

function buildSpinnerItems(winner) {
  // Fill track: 60 random items + winner at position 50
  const items = selectedCase.items;
  const count = 60;
  const winnerPos = 50;
  const track = [];
  for(let i = 0; i < count; i++) {
    if(i === winnerPos) {
      track.push({...winner, isWinner: true});
    } else {
      track.push(items[Math.floor(Math.random()*items.length)]);
    }
  }
  return track;
}

function renderSpinner(items) {
  const track = document.getElementById('spinnerTrack');
  track.innerHTML = '';
  track.style.transform = 'translateX(0)';
  items.forEach((item, i) => {
    const r = RARITIES[item.rarity];
    const div = document.createElement('div');
    div.className = 'spin-item' + (item.isWinner ? ' winner-target' : '');
    div.style.setProperty('--item-color', r.color);
    div.innerHTML = `<div class="item-model">${item.model}</div><div class="item-name">${item.name}</div>`;
    track.appendChild(div);
  });
  return track;
}

// ══════════════════════════════════════════
//  OPEN CASE
// ══════════════════════════════════════════

function openCase() {
  if(spinning) return;
  if(keys <= 0) { showToast('NO KEYS — GET MORE!'); return; }
  resumeAudio();
  playOpenClick();

  keys--;
  opens++;
  updateHUD();

  const winner = weightedRoll(selectedCase.items);
  const trackItems = buildSpinnerItems(winner);
  const track = renderSpinner(trackItems);
  const winnerPos = 50;

  // Hide previous result
  const resultCard = document.getElementById('resultCard');
  resultCard.style.display = 'none';

  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  // Calculate target offset so winner is centered
  const windowW = document.getElementById('spinnerWindow').offsetWidth;
  const centerOffset = windowW / 2 - ITEM_W / 2;
  const targetX = -(winnerPos * ITEM_W - centerOffset) + (Math.random()*40 - 20);

  // Animate
  const duration = 4800;
  const start = performance.now();
  let lastTick = 0;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  const totalDist = Math.abs(targetX);
  
  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const e = easeOut(t);
    const currentX = e * targetX;
    track.style.transform = `translateX(${currentX}px)`;

    // Tick sound based on velocity
    const velocity = Math.abs(targetX * (1 - Math.pow(1-t,3)) / duration);
    const tickInterval = Math.max(50, 200 - velocity * 0.5);
    if(now - lastTick > tickInterval * (0.5 + t*0.5)) {
      playTick();
      lastTick = now;
    }

    if(t < 1) {
      requestAnimationFrame(animate);
    } else {
      // Done!
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      revealWinner(winner);
    }
  }
  requestAnimationFrame(animate);
}

function revealWinner(item) {
  const r = RARITIES[item.rarity];
  playReveal(item.rarity);
  flashScreen(r.color);
  if(item.rarity !== 'common') spawnParticles(r.color);

  const card = document.getElementById('resultCard');
  card.style.setProperty('--result-color', r.color);
  card.style.display = 'flex';
  document.getElementById('resultRarity').textContent = r.name.toUpperCase();
  document.getElementById('resultModel').textContent = item.model;
  document.getElementById('resultName').textContent = item.name;
  document.getElementById('resultValue').textContent = `Estimated Value: $${item.value.toFixed(2)}`;

  // Best drop
  if(!bestDrop || item.value > bestDrop.value) {
    bestDrop = item;
    document.getElementById('bestDrop').textContent = item.name.split('|')[1]?.trim().toUpperCase() || item.name;
  }

  // History
  addHistory(item, r.color);
}

function spawnParticles(color) {
  const count = 40;
  for(let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 4 + Math.random()*8;
    el.style.cssText = `
      width:${size}px;height:${size}px;
      background:${color};
      left:${window.innerWidth/2}px;top:${window.innerHeight/2}px;
      --tx:${(Math.random()-0.5)*600}px;
      --ty:${(Math.random()-0.5)*400}px;
      opacity:1;
      box-shadow:0 0 6px ${color};
      animation-duration:${0.6+Math.random()*0.8}s;
      animation-delay:${Math.random()*0.2}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

function flashScreen(color) {
  const f = document.getElementById('flashOverlay');
  f.style.setProperty('--flash-color', color);
  f.classList.add('active');
  setTimeout(() => f.classList.remove('active'), 150);
}

function addHistory(item, color) {
  history.unshift({item, color, case_name: selectedCase.name});
  if(history.length > 30) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  history.forEach(h => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.style.setProperty('--item-color', h.color);
    div.innerHTML = `
      <div class="history-emoji">${h.item.model}</div>
      <div class="history-info">
        <div class="history-name">${h.item.name}</div>
        <div class="history-case">${h.case_name} · $${h.item.value.toFixed(2)}</div>

    list.appendChild(div);
  });
}
